<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movesa Logistics System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #e91e63; --bg: #0b0b0b; --card: #161616; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .filter-bar { background: var(--card); padding: 20px; border-radius: 12px; display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
        input, select { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        th { background: #222; color: var(--primary); }
        .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--primary); }
        .modal { background: rgba(0,0,0,0.9); position: fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 15px; width: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MOVESA | إدارة المخزن</h1>
        <button onclick="showModal()">+ استلام بضاعة جديدة</button>
    </div>

    <div class="filter-bar">
        <div>
            <label>من تاريخ:</label><br>
            <input type="date" id="date-from">
        </div>
        <div>
            <label>إلى تاريخ:</label><br>
            <input type="date" id="date-to">
        </div>
        <button onclick="loadData()">تطبيق الفلتر</button>
    </div>

    <table id="inventory-table">
        <thead>
            <tr>
                <th>الصورة</th>
                <th>اسم المنتج</th>
                <th>SKU</th>
                <th>الكمية</th>
                <th>الموقع</th>
                <th>التاريخ</th>
            </tr>
        </thead>
        <tbody id="data-body">
            </tbody>
    </table>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--primary)">استلام شحنة</h2>
        <input type="text" id="p-name" placeholder="اسم المنتج" style="width:100%; margin-bottom:10px;">
        <input type="text" id="p-sku" placeholder="SKU" style="width:100%; margin-bottom:10px;">
        <input type="number" id="p-qty" placeholder="الكمية" style="width:100%; margin-bottom:10px;">
        <input type="text" id="p-img" placeholder="رابط صورة المنتج (اختياري)" style="width:100%; margin-bottom:10px;">
        <select id="p-loc" style="width:100%; margin-bottom:20px;">
            <option value="A-A-1">A-A-1</option>
            <option value="B-A-1">B-A-1</option>
        </select>
        <button onclick="saveData()" style="width:100%">تأكيد وحفظ</button>
        <button onclick="hideModal()" style="width:100%; background:#444; margin-top:10px;">إلغاء</button>
    </div>
</div>

<script>
    // ضع هنا إعدادات Firebase الخاصة بك (Config)
    const firebaseConfig = {
        databaseURL: "https://makeover-2c061-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showModal() { document.getElementById('addModal').style.display='flex'; }
    function hideModal() { document.getElementById('addModal').style.display='none'; }

    // حفظ البيانات مع التوقيت والصورة
    function saveData() {
        const timestamp = new Date().toISOString(); // حفظ الوقت بدقة
        const data = {
            name: document.getElementById('p-name').value,
            sku: document.getElementById('p-sku').value,
            qty: document.getElementById('p-qty').value,
            img: document.getElementById('p-img').value || 'https://via.placeholder.com/60',
            loc: document.getElementById('p-loc').value,
            date: timestamp
        };

        db.ref('inbound').push(data).then(() => {
            alert('تم الاستلام بنجاح');
            hideModal();
            loadData();
        });
    }

    // عرض البيانات مع الفلترة بالوقت
    function loadData() {
        const fromDate = document.getElementById('date-from').value;
        const toDate = document.getElementById('date-to').value;
        
        db.ref('inbound').on('value', (snapshot) => {
            let html = '';
            snapshot.forEach((child) => {
                const item = child.val();
                const itemDate = item.date.split('T')[0];

                // منطق الفلترة
                if ((!fromDate || itemDate >= fromDate) && (!toDate || itemDate <= toDate)) {
                    html += `
                        <tr>
                            <td><img src="${item.img}" class="product-img"></td>
                            <td>${item.name}</td>
                            <td>${item.sku}</td>
                            <td>${item.qty}</td>
                            <td><span style="background:#333; padding:5px; border-radius:4px;">${item.loc}</span></td>
                            <td>${new Date(item.date).toLocaleDateString('ar-EG')}</td>
                        </tr>
                    `;
                }
            });
            document.getElementById('data-body').innerHTML = html;
        });
    }

    window.onload = loadData;
</script>

</body>
</html>
